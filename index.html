<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Min Rit-app</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: black; font-family: -apple-system, sans-serif; }
        #camera { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }
        #overlay { width: 100%; height: 100%; object-fit: contain; position: absolute; z-index: 2; pointer-events: none; top: 0; left: 0; }
        .controls { position: absolute; bottom: 40px; left: 5%; width: 90%; z-index: 3; background: rgba(255,255,255,0.85); padding: 20px; border-radius: 20px; box-sizing: border-box; backdrop-filter: blur(10px); }
        input[type=range] { width: 100%; margin-top: 10px; }
        button { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: none; background: #007AFF; color: white; font-weight: 600; }
    </style>
</head>
<body>
<video id="camera" autoplay playsinline></video>
<img id="overlay" src="" style="display:none;">
<div class="controls">
    <button onclick="document.getElementById('fileInput').click()">Välj bild att rita av</button>
    <input type="file" id="fileInput" style="display:none;" accept="image/*">
    <label>Genomskinlighet:</label>
    <input type="range" id="opacity" min="0" max="1" step="0.1" value="0.5">
</div>
<script>
    const video = document.getElementById('camera');
    const overlay = document.getElementById('overlay');
    const opacitySlider = document.getElementById('opacity');
    const fileInput = document.getElementById('fileInput');
    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
        } catch (err) { alert("Kameran kunde inte startas. Ge tillåtelse i Safari."); }
    }
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                overlay.src = event.target.result;
                overlay.style.display = "block";
                overlay.style.opacity = opacitySlider.value;
            };
            reader.readAsDataURL(file);
        }
    });
    opacitySlider.addEventListener('input', (e) => { overlay.style.opacity = e.target.value; });
    startCamera();
</script>
</body>
</html>
