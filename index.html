<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rit-app Smooth Pro</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: black; font-family: -apple-system, sans-serif; }
        
        #camera-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: 1; }
        #camera { width: 100%; height: 100%; object-fit: cover; display: block; transform-origin: center center; will-change: transform; }

        #overlay-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; display: flex; align-items: center; justify-content: center; touch-action: none; }
        #overlay { position: absolute; max-width: 80%; max-height: 80%; pointer-events: none; user-select: none; display: none; will-change: transform, opacity; transform-origin: center center; }
        
        .top-btns { position: absolute; top: 20px; right: 20px; z-index: 10; display: flex; gap: 12px; }
        .circle-btn { background: rgba(255,255,255,0.8); border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4); backdrop-filter: blur(5px); }
        .circle-btn.mode-camera { background: #007AFF; color: white; }
        
        /* Kontrollpanel med minimering */
        .controls { 
            position: absolute; bottom: 20px; left: 5%; width: 90%; z-index: 10; 
            background: rgba(255,255,255,0.9); padding: 15px; border-radius: 20px; 
            backdrop-filter: blur(10px); box-sizing: border-box; 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .controls.minimized { transform: translateY(calc(100% - 45px)); }
        
        .minimize-handle { 
            width: 100%; height: 30px; margin-top: -10px; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .minimize-handle::after { content: '▼'; font-size: 14px; color: #888; transition: transform 0.4s; }
        .controls.minimized .minimize-handle::after { content: '▲'; }

        .btn-row { display: flex; gap: 10px; margin-top: 10px; }
        button#selectBtn { width: 100%; padding: 12px; border-radius: 12px; border: none; background: #007AFF; color: white; font-weight: 600; font-size: 15px; }
        .sec-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #ccc; background: white; font-size: 13px; font-weight: 500; }
        
        label { font-size: 10px; color: #333; margin-top: 12px; display: block; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        input[type=range] { width: 100%; margin: 8px 0; height: 25px; }
        
        .status-badge { position: absolute; top: 30px; left: 20px; padding: 6px 14px; background: #007AFF; color: white; border-radius: 20px; font-size: 12px; font-weight: 600; z-index: 10; display: none; pointer-events: none; }
    </style>
</head>
<body>

<div id="status" class="status-badge">SYNKRONISERAD ZOOM</div>

<div id="camera-wrapper">
    <video id="camera" autoplay playsinline></video>
</div>

<div class="top-btns">
    <button id="modeBtn" class="circle-btn" onclick="toggleMode()">📷</button>
    <button class="circle-btn" onclick="resetImage()">↺</button>
</div>

<div id="overlay-container">
    <img id="overlay" src="">
</div>

<div class="controls" id="controlsPanel">
    <div class="minimize-handle" onclick="toggleMinimize()"></div>
    
    <button id="selectBtn" onclick="document.getElementById('fileInput').click()">Hämta bild från bibliotek</button>
    <!-- Endast bibliotek genom att skippa 'capture' attributet -->
    <input type="file" id="fileInput" style="display:none;" accept="image/*">
    
    <div class="btn-row">
        <button class="sec-btn" onclick="mirrorImage()">↔ Spegelvänd</button>
    </div>

    <label>Genomskinlighet:</label>
    <input type="range" id="opacity" min="0" max="1" step="0.05" value="0.5">
</div>

<script>
    const video = document.getElementById('camera');
    const overlay = document.getElementById('overlay');
    const container = document.getElementById('overlay-container');
    const opacityS = document.getElementById('opacity');
    const controls = document.getElementById('controlsPanel');
    const statusBadge = document.getElementById('status');
    const modeBtn = document.getElementById('modeBtn');

    let videoTrack = null;
    let scale = 1, cameraZoom = 1;
    let posX = 0, posY = 0, lastX = 0, lastY = 0;
    let initialDist = 0, mirror = 1;
    let isCameraMode = false, isTicking = false;
    let lastScale = 1, lastCameraZoom = 1;

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            videoTrack = stream.getVideoTracks();
        } catch (err) { alert("Kameran kunde inte startas."); }
    }

    function toggleMinimize() {
        controls.classList.toggle('minimized');
    }

    function updateTransform() {
        const totalScale = scale * cameraZoom;
        overlay.style.transform = `translate(${posX * cameraZoom}px, ${posY * cameraZoom}px) scale(${totalScale * mirror}, ${totalScale})`;
        overlay.style.opacity = opacityS.value;
        video.style.transform = `scale(${cameraZoom})`;
        isTicking = false;
    }

    function requestUpdate() {
        if (!isTicking) { requestAnimationFrame(updateTransform); isTicking = true; }
    }

    async function applyHardwareZoom(zoomLevel) {
        if (!videoTrack || !videoTrack[0].getCapabilities) return;
        try {
            const caps = videoTrack[0].getCapabilities();
            if (caps.zoom) {
                const z = Math.max(caps.zoom.min, Math.min(zoomLevel, caps.zoom.max));
                await videoTrack[0].applyConstraints({ advanced: [{ zoom: z }] });
            }
        } catch (e) {}
    }

    function toggleMode() {
        isCameraMode = !isCameraMode;
        modeBtn.innerText = isCameraMode ? "🖼️" : "📷";
        modeBtn.classList.toggle('mode-camera', isCameraMode);
        statusBadge.style.display = isCameraMode ? "block" : "none";
    }

    function resetImage() {
        scale = 1; posX = 0; posY = 0; mirror = 1; cameraZoom = 1;
        applyHardwareZoom(1);
        requestUpdate();
    }

    function mirrorImage() { mirror *= -1; requestUpdate(); }

    container.addEventListener('touchstart', e => {
        const touches = e.touches;
        if (touches.length === 1) {
            if (!isCameraMode) { lastX = touches[0].clientX - posX; lastY = touches[0].clientY - posY; }
        } else if (touches.length === 2) {
            initialDist = Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY);
            lastScale = scale; lastCameraZoom = cameraZoom;
            if (!isCameraMode) {
                const midX = (touches[0].clientX + touches[1].clientX) / 2;
                const midY = (touches[0].clientY + touches[1].clientY) / 2;
                lastX = midX - posX; lastY = midY - posY;
            }
        }
    });

    container.addEventListener('touchmove', e => {
        const touches = e.touches;
        if (touches.length === 0) return;
        e.preventDefault();
        if (touches.length === 1 && !isCameraMode) {
            posX = touches[0].clientX - lastX;
            posY = touches[0].clientY - lastY;
        } else if (touches.length === 2) {
            const dist = Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY);
            const ratio = dist / initialDist;
            if (isCameraMode) {
                cameraZoom = Math.max(1, Math.min(lastCameraZoom * ratio, 10));
                applyHardwareZoom(cameraZoom);
            } else {
                scale = lastScale * ratio;
                const midX = (touches[0].clientX + touches[1].clientX) / 2;
                const midY = (touches[0].clientY + touches[1].clientY) / 2;
                posX = midX - lastX; posY = midY - lastY;
            }
        }
        requestUpdate();
    }, { passive: false });

    document.getElementById('fileInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => { 
                overlay.src = ev.target.result; 
                overlay.style.display = 'block';
                resetImage();
                if (!controls.classList.contains('minimized')) toggleMinimize();
            };
            reader.readAsDataURL(file);
        }
    });

    opacityS.addEventListener('input', requestUpdate);
    startCamera();
</script>
</body>
</html>
