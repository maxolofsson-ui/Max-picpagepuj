<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rit-app Smooth Pro</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: black; font-family: -apple-system, sans-serif; }
        #zoom-viewport { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: center center; z-index: 1; }
        #camera { width: 100%; height: 100%; object-fit: cover; display: block; }
        #overlay-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; display: flex; align-items: center; justify-content: center; touch-action: none; }
        #overlay { position: absolute; max-width: 80%; max-height: 80%; pointer-events: none; user-select: none; display: none; will-change: transform, opacity; transform-origin: center center; }
        .top-btns { position: absolute; top: 20px; right: 20px; z-index: 10; display: flex; gap: 12px; }
        .circle-btn { background: rgba(255,255,255,0.8); border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4); backdrop-filter: blur(5px); }
        .circle-btn.mode-camera { background: #007AFF; color: white; }
        .controls { position: absolute; bottom: 20px; left: 5%; width: 90%; z-index: 10; background: rgba(255,255,255,0.9); padding: 15px; border-radius: 20px; backdrop-filter: blur(10px); box-sizing: border-box; transition: transform 0.4s ease; }
        .controls.minimized { transform: translateY(calc(100% - 45px)); }
        .minimize-handle { width: 100%; height: 30px; margin-top: -10px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
        .minimize-handle::after { content: '▼'; font-size: 14px; color: #888; }
        .controls.minimized .minimize-handle::after { content: '▲'; }
        button#selectBtn { width: 100%; padding: 12px; border-radius: 12px; border: none; background: #007AFF; color: white; font-weight: 600; }
        .sec-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #ccc; background: white; font-size: 13px; margin-top:10px; width: 100%; }
        input[type=range] { width: 100%; margin: 8px 0; }
    </style>
</head>
<body>

<div id="zoom-viewport">
    <video id="camera" autoplay playsinline></video>
</div>

<div class="top-btns">
    <button id="modeBtn" class="circle-btn" onclick="toggleMode()">📷</button>
    <button class="circle-btn" onclick="resetImage()">↺</button>
</div>

<div id="overlay-container">
    <img id="overlay" src="">
</div>

<div class="controls" id="controlsPanel">
    <div class="minimize-handle" onclick="toggleMinimize()"></div>
    <button id="selectBtn" onclick="document.getElementById('fileInput').click()">Hämta bild från bibliotek</button>
    <input type="file" id="fileInput" style="display:none;" accept="image/*">
    <button class="sec-btn" onclick="mirrorImage()">↔ Spegelvänd</button>
    <label style="display:block; font-size:10px; font-weight:bold; margin-top:10px;">GENOMSKINLIGHET</label>
    <input type="range" id="opacity" min="0" max="1" step="0.05" value="0.5">
</div>

<script>
    const viewport = document.getElementById('zoom-viewport');
    const video = document.getElementById('camera');
    const overlay = document.getElementById('overlay');
    const container = document.getElementById('overlay-container');
    const opacityS = document.getElementById('opacity');
    const controls = document.getElementById('controlsPanel');
    const modeBtn = document.getElementById('modeBtn');

    let scale = 1, cameraZoom = 1;
    let posX = 0, posY = 0, lastX = 0, lastY = 0;
    let initialDist = 0, mirror = 1;
    let isCameraMode = false, isTicking = false;
    let lastScale = 1, lastCameraZoom = 1;

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
        } catch (err) { alert("Kameran kunde inte startas."); }
    }

    function updateTransform() {
        overlay.style.transform = `translate(${posX}px, ${posY}px) scale(${scale * mirror}, ${scale})`;
        overlay.style.opacity = opacityS.value;
        viewport.style.transform = `scale(${cameraZoom})`;
        container.style.transform = `scale(${cameraZoom})`;
        isTicking = false;
    }

    function requestUpdate() {
        if (!isTicking) { requestAnimationFrame(updateTransform); isTicking = true; }
    }

    function toggleMode() {
        isCameraMode = !isCameraMode;
        modeBtn.innerText = isCameraMode ? "🖼️" : "📷";
        modeBtn.classList.toggle('mode-camera', isCameraMode);
    }

    function toggleMinimize() { controls.classList.toggle('minimized'); }

    function resetImage() {
        scale = 1; posX = 0; posY = 0; mirror = 1; cameraZoom = 1;
        requestUpdate();
    }

    function mirrorImage() { mirror *= -1; requestUpdate(); }

    container.addEventListener('touchstart', e => {
        const t = e.touches;
        if (t.length === 1) {
            lastX = (t[0].clientX / cameraZoom) - posX;
            lastY = (t[0].clientY / cameraZoom) - posY;
        } else if (t.length === 2) {
            initialDist = Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);
            lastScale = scale;
            lastCameraZoom = cameraZoom;
        }
    }, { passive: false });

    container.addEventListener('touchmove', e => {
        const t = e.touches;
        e.preventDefault();
        
        if (t.length === 1 && !isCameraMode) {
            // Panorera bilden
            posX = (t[0].clientX / cameraZoom) - lastX;
            posY = (t[0].clientY / cameraZoom) - lastY;
        } else if (t.length === 2) {
            // Zooma
            const dist = Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);
            if (dist > 10) {
                const ratio = dist / initialDist;
                if (isCameraMode) {
                    cameraZoom = Math.max(1, Math.min(lastCameraZoom * ratio, 10));
                } else {
                    scale = Math.max(0.1, Math.min(lastScale * ratio, 10));
                }
            }
        }
        requestUpdate();
    }, { passive: false });

    document.getElementById('fileInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => { 
                overlay.src = ev.target.result; 
                overlay.style.display = 'block';
                resetImage();
                if (!controls.classList.contains('minimized')) toggleMinimize();
            };
            reader.readAsDataURL(file);
        }
    });

    opacityS.addEventListener('input', requestUpdate);
    startCamera();
</script>
</body>
</html>
